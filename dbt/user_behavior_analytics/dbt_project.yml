name: 'user_behavior_analytics'
version: '1.0.0'
config-version: 2

profile: 'user_behavior_analytics'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  user_behavior_analytics:
    staging:
      +materialized: view
      +schema: STG
      +database: STAGING_DB
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: MARTS
      +database: ANALYTICS_DB